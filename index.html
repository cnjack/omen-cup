    .tab-btn[data-game="lol"] .tab-icon::before{position:absolute;inset:1px;content:"";opacity:.9;background:currentColor;clip-path:polygon(30% 0%,70% 0%,100% 30%,100% 70%,70% 100%,30% 100%,0% 70%,0% 30%);}
    .tab-teams{padding:2px 6px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.11);font-size:8px;font-weight:900;letter-spacing:.08em;color:rgba(255,255,255,.36);transition:color 200ms,border-color 200ms,background 200ms;}

    .tab-btn[data-game="ow2"].active .tab-teams{color:var(--ow2);border-color:rgba(255,124,32,.35);background:rgba(255,124,32,.08);}
    .tab-btn[data-game="lol"].active .tab-teams{color:var(--lol);border-color:rgba(200,155,60,.35);background:rgba(200,155,60,.08);}
    .tab-divider{width:1px;background:var(--border);align-self:stretch;margin:11px 0;}
    .panels{position:relative;overflow:hidden;}
    .panel{position:absolute;inset:0;opacity:0;pointer-events:none;transition:opacity 260ms ease;}
    .panel.active{opacity:1;pointer-events:auto;}
    .panel iframe{width:100%;height:100%;border:none;display:block;}

    :root {
      color-scheme: dark;

    * { box-sizing: border-box; }

    html { min-width: 320px; background: #0F1923; scroll-behavior: smooth; }

      mix-blend-mode: screen;

    button { font: inherit; }

    *, *::before, *::after { box-sizing: border-box; }

    .page-shell {
      width: min(100%, 1880px);

      padding: 32px clamp(18px, 3.2vw, 64px) 48px;

    /* ─── Masthead ─── */
    .masthead {

      grid-template-columns: 1fr auto 1fr;

      letter-spacing: 0.42em; text-transform: uppercase;
    }

    /* ─── Control strip ─── */
    .control-strip {
      display: grid;
      grid-template-columns: minmax(220px, 0.72fr) minmax(320px, 1.55fr) auto;
      align-items: center;

    .count-lockup { display: flex; align-items: baseline; gap: 11px; white-space: nowrap; }

    .format-status strong, .format-status span { display: block; }

      background: rgba(255, 70, 85, 0.15);

    /* ─── Bracket frame ─── */
    .bracket-frame {
      position: relative; margin-top: 14px; overflow: hidden;
      border: 1px solid var(--line-soft); background: #070708;
      box-shadow: 0 32px 90px rgba(0, 0, 0, 0.4);
    }

    .bracket-frame::before {

      width: 3px; height: 100%; content: &quot;&quot;;
      background: linear-gradient(var(--accent), transparent 58%);
      box-shadow: 0 0 18px rgba(255, 70, 85, 0.5);

    .scroll-hint {
      display: none; padding: 9px 12px; color: var(--muted);

    .bracket {
      position: relative;
      width: 100%; min-width: 1700px; height: 1100px;
      overflow: hidden; isolation: isolate;
      background:
        linear-gradient(90deg, rgba(255, 255, 255, 0.022) 1px, transparent 1px) 0 0 / 132px 100%,
        linear-gradient(180deg, rgba(255, 255, 255, 0.015) 1px, transparent 1px) 0 0 / 100% 128px,
        radial-gradient(circle at 62% 44%, rgba(255, 70, 85, 0.05), transparent 28rem),
        linear-gradient(145deg, rgba(80, 0, 8, 0.08), transparent 36%),

    }

    .bracket::before {
      position: absolute; z-index: -1; top: 332px; left: 640px;
      color: rgba(255, 255, 255, 0.018); content: &quot;OMEN&quot;;
      font-family: var(--display); font-size: 250px; font-weight: 1000;
      letter-spacing: -0.08em; transform: skew(-8deg);
    }

    .bracket::after {
      position: absolute; z-index: -1; inset: 0; content: &quot;&quot;;
      opacity: 0.12;
      background-image:
        repeating-radial-gradient(circle at 12% 22%, rgba(255, 70, 85, 0.55) 0 1px, transparent 1px 18px),
        linear-gradient(20deg, transparent 58%, rgba(255, 70, 85, 0.08) 58.2% 58.35%, transparent 58.6%);
      background-size: 290px 230px, 760px 480px;
      mask-image: linear-gradient(90deg, #000, transparent 78%);
    }

    /* ─── Stage labels ─── */
    .stage-label {
      position: absolute; z-index: 3; top: 28px; width: 224px;
      padding-bottom: 12px;
      color: rgba(255, 255, 255, 0.5);
      font-family: var(--display); font-size: 11px; font-weight: 900;
      letter-spacing: 0.18em; text-transform: uppercase;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }

    .stage-label::after {
      display: block; width: 34px; height: 2px; margin-top: 10px; content: &quot;&quot;;
      background: var(--accent); box-shadow: 0 0 12px var(--accent);
    }

    .stage-label b {
      display: block; margin-bottom: 4px; color: #fff;
      font-size: 18px; letter-spacing: 0.06em;
    }

    .stage-label .date {
      display: block; margin-top: 4px; color: var(--accent);
      font-size: 10px; opacity: 0.9;
    }

    .stage-label .venue {
      display: block; margin-top: 6px;

      letter-spacing: 0.04em; text-transform: none; line-height: 1.4;
    }

    .stage-label.s1 { left: 40px; }
    .stage-label.s2 { left: 420px; }
    .stage-label.s3 { left: 820px; }
    .stage-label.s4 { left: 1200px; }
    .stage-label.s5 { left: 1470px; }

    /* ─── Group divider labels ─── */
    .group-pill {
      position: absolute; z-index: 3; left: 14px;
      padding: 4px 10px;
      font-family: var(--display); font-size: 9px; font-weight: 900;

      backdrop-filter: blur(3px);
    }

    .group-pill.a {

    }

    .group-pill.b {
      color: var(--accent); border-left: 2px solid var(--accent);
    }

    /* ─── SVG connectors ─── */
    .connectors {
      position: absolute; z-index: 0; inset: 0;
      width: 1700px; height: 1100px; pointer-events: none;
    }

    .connectors path {
      fill: none;
      stroke: rgba(255, 255, 255, 0.48);
      stroke-width: 1.6;
      vector-effect: non-scaling-stroke;
    }

      stroke-dasharray: 6 5;

    .match {

      animation-delay: calc(var(--order, 0) * 42ms);

    @keyframes match-in {
      from { opacity: 0; transform: translateX(-12px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    .match-head {
      display: grid; align-content: center; gap: 4px;
      height: 42px; padding: 7px 10px 8px;
      color: #fff; font-family: var(--display);
      font-size: 18px; font-weight: 1000; letter-spacing: 0.04em;

    .match-head > span { display: block; line-height: 1; }

    .match-head small {
      color: rgba(255, 255, 255, 0.72); font-size: 10px; font-weight: 800;
      letter-spacing: 0.08em; text-transform: uppercase; line-height: 1.05;
    }

    .match-body {
      position: relative; overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.24);
      border-left: 2px solid var(--red);
      background:
        linear-gradient(100deg, rgba(116, 0, 7, 0.92), rgba(51, 0, 4, 0.82) 68%, rgba(15, 10, 11, 0.92)),

      box-shadow: var(--shadow-red), inset 0 0 20px rgba(255, 255, 255, 0.025);

      background: rgba(255, 255, 255, 0.12); transform: rotate(28deg);

      border-bottom: 1px solid rgba(255, 255, 255, 0.11);
    }

    .competitor:last-child { border-bottom: 0; }

    .seed {
      display: none;
      min-width: 28px;
      color: rgba(255, 255, 255, 0.48); font-family: var(--display);
      font-size: 9px; font-weight: 900; letter-spacing: 0.05em;
      text-align: center;
    }

    .competitor.winner .seed,
    .competitor.loser .seed,
    .seed.win,
    .seed.bye {
      display: block;
      font-size: 0;
    }

    .competitor.winner .seed::after,
    .seed.win::after {
      content: &quot;WIN&quot;;
      font-size: 9px;
      line-height: 1;
    }

    .competitor.loser .seed::after {
      content: &quot;BYE&quot;;
      font-size: 9px;
      line-height: 1;
    }

    .seed.bye::after {
      content: &quot;WIN&quot;;
      font-size: 9px;
      line-height: 1;
    }

    .team-copy { min-width: 0; }

    .team-name, .team-tag {
      display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }

    .team-name { color: #fff; font-size: 13px; font-weight: 800; line-height: 1.1; }

    .team-tag {
      margin-top: 2px; color: rgba(255, 255, 255, 0.5);
      font-family: var(--display); font-size: 8.5px; font-weight: 700;
      letter-spacing: 0.05em; text-transform: uppercase;
    }

    .competitor.winner {
      background: linear-gradient(90deg, rgba(74, 152, 255, 0.14), rgba(74, 152, 255, 0.04) 72%, transparent);
    }

    .score {
      justify-self: end;
      min-width: 18px;
      color: rgba(255, 255, 255, 0.58);
      font-family: var(--display);
      font-size: 16px;
      font-weight: 900;
      line-height: 1;
      text-align: right;
    }

    .competitor.winner .score {
      color: #6fb4ff;
      text-shadow: 0 0 12px rgba(111, 180, 255, 0.35);
    }

    /* Flow / draw variant */
    .match.flow .match-body {
      border-left-color: rgba(255, 70, 85, 0.65);
      background: linear-gradient(100deg, rgba(80, 0, 8, 0.72), rgba(14, 13, 18, 0.96));
    }

    /* Grand final variant */
    .match.final .match-body {
      border: 1px solid rgba(255, 70, 85, 0.5);
      border-left: 3px solid var(--accent);
      box-shadow: 0 0 32px rgba(255, 70, 85, 0.2);
    }

    /* ─── Bye block ─── */
    .bye-block {
      position: absolute; z-index: 2; width: 224px;
      animation: match-in 520ms cubic-bezier(0.2, 0.85, 0.28, 1) both;
      animation-delay: calc(var(--order, 0) * 42ms);
    }

    .bye-block-inner {
      display: flex; align-items: center; justify-content: space-between;
      min-height: 72px; padding: 11px 13px;
      border: 1px dashed rgba(255, 255, 255, 0.18);
      background: rgba(255, 255, 255, 0.016);
      clip-path: polygon(0 0, calc(100% - 10px) 0, 100% 10px, 100% 100%, 10px 100%, 0 calc(100% - 10px));
    }

    .bye-label {
      font-family: var(--display); font-size: 10px; font-weight: 900;
      letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted);
    }

    .bye-team {
      display: block; font-size: 14px; font-weight: 800; color: #fff; margin-top: 4px;
    }

    .bye-tag {
      display: block; font-family: var(--display); font-size: 8.5px; font-weight: 700;
      color: rgba(255,255,255,0.42); letter-spacing: 0.08em;
      text-transform: uppercase; margin-top: 3px;
    }

    .bye-badge {
      padding: 4px 7px; color: var(--accent);
      border: 1px solid rgba(255, 70, 85, 0.35);
      background: rgba(255, 70, 85, 0.06);
      font-family: var(--display); font-size: 9px; font-weight: 900;
      letter-spacing: 0.1em; text-transform: uppercase;
    }

    /* SHP direct pass bye block */
    .bye-block.direct .bye-block-inner {
      border-color: rgba(255, 70, 85, 0.3);
      background: rgba(255, 70, 85, 0.05);
    }

    /* ─── Champion ─── */
    .champion {
      position: absolute; z-index: 2;
      width: 184px;
      display: flex; flex-direction: column; align-items: center;
      padding: 20px 16px 22px;
      border: 1px solid rgba(255, 70, 85, 0.62);
      background:
        radial-gradient(ellipse at 50% 28%, rgba(255, 70, 85, 0.22) 0%, transparent 62%),
        linear-gradient(160deg, rgba(100, 0, 8, 0.55) 0%, #0F1923 70%);
      box-shadow:
        0 0 55px rgba(255, 70, 85, 0.38),
        0 0 110px rgba(255, 70, 85, 0.14),
        inset 0 1px 0 rgba(255, 70, 85, 0.28),
        inset 0 0 35px rgba(255, 70, 85, 0.07);
      clip-path: polygon(0 18px, 18px 0, 100% 0, 100% calc(100% - 18px), calc(100% - 18px) 100%, 0 100%);
      text-align: center;
      animation: pulse-crown 2.6s ease-in-out infinite;
    }

    @keyframes pulse-crown {
      0%, 100% {
        filter: brightness(0.9);
        box-shadow: 0 0 45px rgba(255, 70, 85, 0.30), 0 0 90px rgba(255, 70, 85, 0.10), inset 0 0 28px rgba(255, 70, 85, 0.05);
      }
      50% {
        filter: brightness(1.22);
        box-shadow: 0 0 72px rgba(255, 70, 85, 0.58), 0 0 140px rgba(255, 70, 85, 0.22), inset 0 0 48px rgba(255, 70, 85, 0.13);
      }
    }

    .champion-trophy {
      width: 54px; height: 62px; margin-bottom: 9px; display: block;
      color: var(--accent);
      filter: drop-shadow(0 0 8px rgba(255, 70, 85, 0.9)) drop-shadow(0 0 18px rgba(255, 70, 85, 0.5));
      animation: trophy-float 3.2s ease-in-out infinite;
    }

    @keyframes trophy-float {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-4px); }
    }

    .champion span, .champion strong { display: block; }

    .champion span {
      color: rgba(255, 70, 85, 0.8); font-family: var(--display);
      font-size: 8px; font-weight: 900; letter-spacing: 0.28em; text-transform: uppercase;
    }

    .champion strong {
      margin-top: 4px; color: #fff; font-family: var(--display);
      font-size: 19px; font-weight: 1000; letter-spacing: 0.06em;
      text-shadow: 0 0 22px rgba(255, 70, 85, 0.72), 0 0 50px rgba(255, 70, 85, 0.32);
    }

    /* ─── Route notes ─── */
    .route-note {
      position: absolute; z-index: 1; max-width: 120px; padding: 6px 8px;
      color: rgba(255,255,255,0.5);
      border-left: 1px solid var(--accent);
      background: rgba(7, 7, 8, 0.82);
      font-size: 9px; font-weight: 700; line-height: 1.52; letter-spacing: 0.02em;
    }

    /* ─── Legend ─── */
    .legend {
      position: absolute; z-index: 3; right: 32px; bottom: 24px;
      display: flex; gap: 18px;
      color: rgba(255,255,255,0.46); font-family: var(--display);
      font-size: 9px; font-weight: 800; letter-spacing: 0.12em; text-transform: uppercase;
    }

    .legend span { display: inline-flex; align-items: center; gap: 7px; }

    .legend i { display: inline-block; width: 24px; border-top: 2px solid rgba(255,255,255,0.65); }
    .legend .draw-line  { border-top-color: var(--accent); border-top-style: dashed; }
    .legend .bye-line   { border-top-color: rgba(255,255,255,0.28); border-top-style: dashed; }
    .legend .champ-line { border-top-color: var(--accent); border-top-width: 2.5px; }

    /* ─── Info section ─── */
    .information-grid {
      display: grid;
      grid-template-columns: minmax(0, 1.22fr) minmax(360px, 0.78fr);
      gap: 14px; margin-top: 14px;
    }

    .info-card {
      position: relative; min-height: 240px; padding: 24px; overflow: hidden;
      border: 1px solid var(--line-soft);
      background: linear-gradient(145deg, rgba(255,255,255,0.052), rgba(8,8,9,0.82));
    }

    .info-card::before {
      position: absolute; top: 0; left: 0; width: 72px; height: 2px; content: &quot;&quot;;
      background: var(--accent); box-shadow: 0 0 15px rgba(255,70,85,0.4);
    }

    .section-heading {
      display: flex; align-items: flex-start; justify-content: space-between;
      gap: 20px; margin-bottom: 18px;
    }

    .section-heading h2, .section-heading p { margin: 0; }

    .section-heading h2 {
      color: #fff; font-family: var(--display);
      font-size: 23px; font-weight: 1000; font-style: italic; letter-spacing: -0.025em;
    }

    .section-heading p {
      max-width: 380px; color: var(--muted);
      font-size: 10px; line-height: 1.6; text-align: right;
    }

    .team-pool {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
      gap: 8px;
    }

    .team-chip {
      position: relative; display: grid;
      grid-template-columns: 22px minmax(0,1fr) auto;
      align-items: center; gap: 7px; min-height: 48px; padding: 6px 9px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.022);
    }

    .team-chip.grp-a {
      border-color: rgba(255,70,85,0.28);
      background: linear-gradient(100deg, rgba(255,70,85,0.08), transparent);
    }

    .team-chip.grp-b {
      border-color: rgba(77,182,255,0.35);
      background: linear-gradient(100deg, rgba(77,182,255,0.1), transparent);
    }

    .team-chip.grp-bye {
      border-color: rgba(255,200,60,0.45);
      background: linear-gradient(100deg, rgba(255,200,60,0.12), transparent);
    }

    .chip-index {
      color: var(--accent); font-family: var(--display);
      font-size: 11px; font-weight: 1000;
    }

    .chip-copy { min-width: 0; }

    .chip-copy strong, .chip-copy span {
      display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }

    .chip-copy strong { color: #fff; font-size: 11px; }

    .chip-copy span {
      margin-top: 2px; color: var(--muted);
      font-size: 8px; letter-spacing: 0.06em; text-transform: uppercase;
    }

    .chip-state {
      padding: 3px 5px; color: #d8d4d0;
      border: 1px solid rgba(255,255,255,0.12);
      font-family: var(--display); font-size: 7px; font-weight: 900;
      letter-spacing: 0.08em; text-transform: uppercase;
    }

    .team-chip.grp-b .chip-index { color: #4db6ff; }

    .team-chip.grp-b .chip-state {
      color: #4db6ff; border-color: rgba(77,182,255,0.38);
      background: rgba(77,182,255,0.08);
    }

    .team-chip.grp-bye .chip-index { color: #ffc83c; }

    .team-chip.grp-bye .chip-state {
      color: #ffc83c; border-color: rgba(255,200,60,0.4);
      background: rgba(255,200,60,0.08);
    }

    /* ─── Rule list ─── */
    .rule-list {
      display: grid; gap: 12px; margin: 0; padding: 0;
      list-style: none; counter-reset: rules;
    }

    .rule-list li {
      position: relative; min-height: 38px; padding: 0 0 12px 43px;
      color: #d1cdca; border-bottom: 1px solid rgba(255,255,255,0.08);
      font-size: 11px; line-height: 1.6; counter-increment: rules;
    }

    .rule-list li:last-child { border-bottom: 0; padding-bottom: 0; }

    .rule-list li::before {
      position: absolute; top: 1px; left: 0;
      display: grid; width: 28px; height: 28px; place-items: center;
      border: 1px solid rgba(255,70,85,0.5);
      color: var(--accent);
      content: counter(rules, decimal-leading-zero);
      font-family: var(--display); font-size: 9px; font-weight: 1000;
      transform: rotate(45deg);
    }

    .rule-list b { color: #fff; }

    /* ─── Footer ─── */
    .page-footer {
      display: flex; justify-content: space-between; gap: 20px;
      margin-top: 18px; padding-top: 15px;
      color: #6f6b69; border-top: 1px solid rgba(255,255,255,0.08);
      font-size: 9px; letter-spacing: 0.08em; text-transform: uppercase;
    }

    /* ─── Responsive ─── */
    @media (max-width: 980px) {
      .masthead { grid-template-columns: 1fr auto; align-items: start; }
      .title-lockup { grid-column: 1 / -1; grid-row: 2; }
      .control-strip { grid-template-columns: 1fr auto; }
      .format-status { grid-column: 1 / -1; grid-row: 2; padding: 12px 0 0; border-top: 1px solid var(--line-soft); border-left: 0; }
      .information-grid { grid-template-columns: 1fr; }
      .scroll-hint { display: block; }
    }

    @media (max-width: 620px) {
      .page-shell { padding-inline: 12px; }
      .masthead { gap: 18px; min-height: 0; }
      h1 { font-size: 44px; }
      h1::before, h1::after { margin: 0 9px; font-size: 8px; }
      .team-pool { grid-template-columns: 1fr 1fr; }
      .page-footer { display: block; line-height: 1.8; }
    }

    @media print {
      @page { size: A3 landscape; margin: 7mm; }
      body { print-color-adjust: exact; -webkit-print-color-adjust: exact; }
      .page-shell { width: 100%; padding: 0; }
      .masthead { min-height: 92px; }
      .actions, .scroll-hint, .information-grid, .page-footer { display: none !important; }
      .control-strip { grid-template-columns: 1fr 2fr; }
      .bracket-frame { border: 0; }
      .bracket-viewport { overflow: visible; }
      .bracket { transform: scale(0.64); transform-origin: top left; }
      .bracket-frame, .bracket-viewport { height: 490px; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }
    /* map-bar */
    .map-bar { display:flex; align-items:center; gap:5px; padding:2px 8px 3px; background:rgba(255,70,85,.06); border-bottom:1px solid rgba(255,70,85,.18); font-family:var(--display); font-size:7px; font-weight:900; letter-spacing:.12em; color:rgba(255,70,85,.7); text-transform:none; }
    .map-bar::before { content:`; width:6px; height:6px; flex-shrink:0; background:rgba(255,70,85,.6); clip-path:polygon(50% 0%,100% 50%,50% 100%,0% 50%); }
    /* side badge */
    .team-tag { display:flex !important; align-items:center; gap:5px; overflow:visible !important; text-overflow:unset !important; }
    .side { flex-shrink:0; padding:1px 5px; font-size:7px; font-weight:900; letter-spacing:.08em; border-radius:2px; line-height:14px; }
    .side.def { background:rgba(66,180,255,.15); color:#6DD5FF; border:1px solid rgba(66,180,255,.3); }
    .side.atk { background:rgba(255,70,85,.15); color:#FF8090; border:1px solid rgba(255,70,85,.3); }
  &lt;/style&gt;

      margin-top: 2px; color: rgba(255,255,255,0.48);

      letter-spacing: 0.05em; text-transform: uppercase;
    }

    .competitor.winner {
      background: linear-gradient(90deg, rgba(255, 170, 90, 0.16), rgba(255, 170, 90, 0.04) 72%, transparent);
    }

    .score {
      justify-self: end;
      min-width: 18px;
      color: rgba(255,255,255,0.56);
      font-family: var(--display);
      font-size: 16px;
      font-weight: 900;
      line-height: 1;
      text-align: right;
    }

    .competitor.winner .score {
      color: #ffb26f;
      text-shadow: 0 0 12px rgba(255, 178, 111, 0.34);
    }

    .match.flow .match-body {
      border-left-color: rgba(255, 180, 80, 0.68);
      background: linear-gradient(100deg, rgba(90, 34, 0, 0.72), rgba(12, 9, 9, 0.96));
    }

    .match.final .match-body {
      border: 1px solid rgba(255, 150, 55, 0.46);
      border-left: 3px solid var(--orange);
      box-shadow: 0 0 32px rgba(255, 120, 30, 0.22), inset 0 0 24px rgba(255,100,20,0.04);
    }

    /* ── Bye block ── */
    .bye-block {
      position: absolute; z-index: 2; width: 224px;
      animation: match-in 520ms cubic-bezier(0.2, 0.85, 0.28, 1) both;
      animation-delay: calc(var(--order, 0) * 42ms);
    }

    .bye-block-inner {
      display: flex; align-items: center; justify-content: space-between;
      min-height: 72px; padding: 11px 13px;
      border: 1px dashed rgba(255,255,255,0.16);
      background: rgba(255,255,255,0.014);
      clip-path: polygon(0 0, calc(100% - 10px) 0, 100% 10px, 100% 100%, 10px 100%, 0 calc(100% - 10px));
    }

    .bye-label {
      font-family: var(--display); font-size: 10px; font-weight: 900;
      letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted);
    }

    .bye-team {
      display: block; font-size: 14px; font-weight: 800; color: #fff; margin-top: 4px;
    }

    .bye-tag {
      display: block; font-family: var(--display); font-size: 8.5px; font-weight: 700;
      color: rgba(255,255,255,0.4); letter-spacing: 0.08em;
      text-transform: uppercase; margin-top: 3px;
    }

    .bye-badge {
      padding: 4px 7px; color: var(--orange);
      border: 1px solid rgba(255, 130, 30, 0.42);
      background: rgba(255, 120, 30, 0.07);
      font-family: var(--display); font-size: 9px; font-weight: 900;
      letter-spacing: 0.1em; text-transform: uppercase;
    }

    .bye-block.direct .bye-block-inner {
      border-color: rgba(255, 130, 30, 0.32);
      background: rgba(255, 110, 20, 0.05);
    }

    /* ── Champion ── */
    .champion {
      position: absolute; z-index: 2; width: 184px;
      display: flex; flex-direction: column; align-items: center;
      padding: 20px 16px 22px;
      border: 1px solid rgba(255, 150, 55, 0.6);
      background:
        radial-gradient(ellipse at 50% 28%, rgba(255, 120, 30, 0.22) 0%, transparent 60%),
        linear-gradient(160deg, rgba(160, 55, 0, 0.58) 0%, #060610 72%);
      box-shadow:
        0 0 55px rgba(255, 120, 30, 0.38),
        0 0 110px rgba(255, 120, 30, 0.14),
        inset 0 1px 0 rgba(255, 190, 80, 0.24),
        inset 0 0 36px rgba(255, 120, 30, 0.07);
      clip-path: polygon(0 18px, 18px 0, 100% 0, 100% calc(100% - 18px), calc(100% - 18px) 100%, 0 100%);
      text-align: center;
      animation: pulse-crown 2.6s ease-in-out infinite;
    }

    @keyframes pulse-crown {
      0%, 100% {
        filter: brightness(0.9);
        box-shadow: 0 0 44px rgba(255,120,30,0.30), 0 0 90px rgba(255,120,30,0.10), inset 0 0 28px rgba(255,120,30,0.05);
      }
      50% {
        filter: brightness(1.22);
        box-shadow: 0 0 72px rgba(255,120,30,0.56), 0 0 132px rgba(255,120,30,0.20), inset 0 0 46px rgba(255,120,30,0.13);
      }
    }

    .champion-trophy {
      width: 54px; height: 62px; margin-bottom: 9px; display: block;
      color: var(--orange);
      filter: drop-shadow(0 0 8px rgba(255, 140, 30, 0.9)) drop-shadow(0 0 18px rgba(255, 120, 20, 0.5));
      animation: trophy-float 3.2s ease-in-out infinite;
    }

    @keyframes trophy-float {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-4px); }
    }

    .champion span, .champion strong { display: block; }

    .champion span {
      color: rgba(255, 160, 60, 0.72); font-family: var(--display);
      font-size: 8px; font-weight: 900; letter-spacing: 0.28em; text-transform: uppercase;
    }

    .champion strong {
      margin-top: 4px; color: #fff; font-family: var(--display);
      font-size: 19px; font-weight: 1000; letter-spacing: 0.06em;
      text-shadow: 0 0 22px rgba(255, 145, 30, 0.72), 0 0 48px rgba(255, 120, 20, 0.32);
    }

    /* ── Legend ── */
    .legend {
      position: absolute; z-index: 3; right: 24px; bottom: 20px;
      display: flex; gap: 18px;
      color: rgba(255,255,255,0.42); font-family: var(--display);
      font-size: 9px; font-weight: 800; letter-spacing: 0.12em; text-transform: uppercase;
    }

    .legend span { display: inline-flex; align-items: center; gap: 7px; }
    .legend i { display: inline-block; width: 24px; border-top: 2px solid rgba(255, 180, 80, 0.7); }
    .legend .bye-line { border-top-color: rgba(255,255,255,0.3); border-top-style: dashed; }
    .legend .champ-line { border-top-color: var(--orange); border-top-width: 2.5px; }

    /* ── Info section ── */
    .information-grid {
      display: grid;
      grid-template-columns: minmax(0, 1.24fr) minmax(360px, 0.76fr);
      gap: 14px; margin-top: 14px;
    }

    .info-card {
      position: relative; min-height: 230px; padding: 24px; overflow: hidden;
      border: 1px solid var(--line-soft);
      background: linear-gradient(145deg, rgba(255,255,255,0.044), rgba(9,10,16,0.88));
    }

    .info-card::before {
      position: absolute; top: 0; left: 0; width: 72px; height: 2px; content: &quot;&quot;;
      background: var(--orange); box-shadow: 0 0 14px rgba(255,130,30,0.45);
    }

    .section-heading {
      display: flex; align-items: flex-start; justify-content: space-between;
      gap: 20px; margin-bottom: 18px;
    }

    .section-heading h2, .section-heading p { margin: 0; }

    .section-heading h2 {
      color: #fff; font-family: var(--display);
      font-size: 22px; font-weight: 1000; font-style: italic; letter-spacing: -0.025em;
    }

    .section-heading p {
      max-width: 360px; color: var(--muted);
      font-size: 10px; line-height: 1.6; text-align: right;
    }

    .team-pool {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(176px, 1fr));
      gap: 10px;
    }

    .team-chip {
      position: relative; display: grid;
      grid-template-columns: 22px minmax(0,1fr) auto;
      align-items: center; gap: 8px; min-height: 50px; padding: 7px 10px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.018);
    }

    .team-chip.grp-a {
      border-color: rgba(255, 120, 30, 0.28);
      background: linear-gradient(100deg, rgba(255, 90, 0, 0.09), transparent);
    }

    .team-chip.grp-b {
      border-color: rgba(66, 180, 255, 0.22);
      background: linear-gradient(100deg, rgba(66, 170, 255, 0.06), transparent);
    }

    .team-chip.grp-bye {
      border-color: rgba(255, 150, 50, 0.44);
      background: linear-gradient(100deg, rgba(255, 140, 40, 0.12), transparent);
    }

    .chip-index {
      color: var(--orange); font-family: var(--display); font-size: 11px; font-weight: 1000;
    }

    .chip-copy { min-width: 0; }

    .chip-copy strong, .chip-copy span {
      display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }

    .chip-copy strong { color: #fff; font-size: 11px; }
    .chip-copy span { margin-top: 2px; color: var(--muted); font-size: 8px; letter-spacing: 0.06em; text-transform: uppercase; }

    .chip-state {
      padding: 3px 5px; color: #d6d2ce;
      border: 1px solid rgba(255,255,255,0.1);
      font-family: var(--display); font-size: 7px; font-weight: 900;
      letter-spacing: 0.08em; text-transform: uppercase;
    }

    .team-chip.grp-bye .chip-state {
      color: var(--orange); border-color: rgba(255,130,30,0.38);
      background: rgba(255,120,30,0.09);
    }

    /* ── Rule list ── */
    .rule-list {
      display: grid; gap: 12px; margin: 0; padding: 0;
      list-style: none; counter-reset: rules;
    }

    .rule-list li {
      position: relative; min-height: 36px; padding: 0 0 12px 46px;
      color: #d0ccc8; border-bottom: 1px solid rgba(255,255,255,0.07);
      font-size: 11px; line-height: 1.64; counter-increment: rules;
    }

    .rule-list li:last-child { border-bottom: 0; padding-bottom: 0; }

    .rule-list li::before {
      position: absolute; top: 1px; left: 0;
      display: grid; width: 30px; height: 30px; place-items: center;
      background: rgba(255, 100, 20, 0.12);
      border: 1px solid rgba(255, 100, 20, 0.48);
      color: var(--orange);
      content: counter(rules, decimal-leading-zero);
      font-family: var(--display); font-size: 9px; font-weight: 1000;
      clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
    }

    .rule-list b { color: #fff; }

    /* ── Footer ── */
    .page-footer {
      display: flex; justify-content: space-between; gap: 20px;
      margin-top: 18px; padding-top: 15px;
      color: #6a6462; border-top: 1px solid rgba(255,255,255,0.07);
      font-size: 9px; letter-spacing: 0.08em; text-transform: uppercase;
    }

    /* ── Responsive ── */
    @media (max-width: 980px) {
      .masthead { grid-template-columns: 1fr auto; align-items: start; }
      .title-lockup { grid-column: 1 / -1; grid-row: 2; }
      .control-strip { grid-template-columns: 1fr auto; }
      .format-status { grid-column: 1 / -1; grid-row: 2; padding: 12px 0 0; border-top: 1px solid var(--line-soft); border-left: 0; }
      .information-grid { grid-template-columns: 1fr; }
      .scroll-hint { display: block; }
    }

    @media (max-width: 620px) {
      .page-shell { padding-inline: 12px; }
      h1 { font-size: 40px; }
      h1::before, h1::after { margin: 0 8px; font-size: 9px; }
      .team-pool { grid-template-columns: 1fr 1fr; }
      .page-footer { display: block; line-height: 1.8; }
    }

    @media print {
      @page { size: A3 landscape; margin: 7mm; }
      body { print-color-adjust: exact; -webkit-print-color-adjust: exact; }
      .page-shell { width: 100%; padding: 0; }
      .masthead { min-height: 100px; }
      .actions, .scroll-hint, .information-grid, .page-footer { display: none !important; }
      .control-strip { grid-template-columns: 1fr 2fr; }
      .bracket-frame { border: 0; }
      .bracket-viewport { overflow: visible; }
      .bracket { transform: scale(0.6); transform-origin: top left; }
      .bracket-frame, .bracket-viewport { height: 560px; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }

        repeating-radial-gradient(circle at 8% 14%, rgba(200,155,60,0.55) 0 1px, transparent 1px 18px),
        linear-gradient(24deg, transparent 58%, rgba(200,155,60,0.10) 58.2% 58.4%, transparent 58.7%),
        linear-gradient(204deg, transparent 72%, rgba(11,196,227,0.06) 72.2% 72.4%, transparent 72.7%);
      background-size: 290px 230px, 760px 480px, 620px 390px;
      mask-image: linear-gradient(90deg, #000, transparent 78%);
    }

    /* ── Stage labels ── */
    .stage-label {
      position: absolute; z-index: 3; top: 28px; width: 224px;
      padding-bottom: 12px;
      color: rgba(255,255,255,0.5);
      font-family: var(--display); font-size: 11px; font-weight: 900;
      letter-spacing: 0.18em; text-transform: uppercase;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .stage-label::after {
      display: block; width: 34px; height: 2px; margin-top: 10px; content: &quot;&quot;;
      background: var(--gold); box-shadow: 0 0 10px rgba(200, 180, 60, 0.7);
    }

    .stage-label b {
      display: block; margin-bottom: 4px; color: #fff;
      font-size: 18px; letter-spacing: 0.06em;
    }

    .stage-label .date {
      display: block; margin-top: 4px; color: var(--gold); font-size: 10px; opacity: 0.9;
    }

    .stage-label .venue {
      display: block; margin-top: 6px;
      color: rgba(255,255,255,0.38);
      font-size: 9px; font-weight: 700;
      letter-spacing: 0.04em; text-transform: none; line-height: 1.4;
    }

    .stage-label.s1 { left: 40px; }
    .stage-label.s2 { left: 420px; }
    .stage-label.s3 { left: 820px; }
    .stage-label.s4 { left: 1200px; }
    .stage-label.s5 { left: 1470px; }

    /* ── Group pills ── */
    .group-pill {
      position: absolute; z-index: 3; left: 14px; padding: 4px 10px;
      font-family: var(--display); font-size: 9px; font-weight: 900;
      letter-spacing: 0.18em; text-transform: uppercase;
      background: rgba(9, 14, 18, 0.86);
      backdrop-filter: blur(3px);
    }

    .group-pill.a { color: var(--gold); border-left: 2px solid var(--gold); }
    .group-pill.b { color: var(--blue); border-left: 2px solid var(--blue); }

    /* ── SVG connectors ── */
    .connectors {
      position: absolute; z-index: 0; inset: 0;
      width: 1700px; height: 1260px; pointer-events: none;
    }

    .connectors path, .connectors line {
      fill: none; vector-effect: non-scaling-stroke;
    }

    .connectors .win-path {
      stroke: rgba(200, 170, 80, 0.72); stroke-width: 1.6;
    }

    .connectors .bye-path {
      stroke: rgba(255, 255, 255, 0.22); stroke-width: 1.6; stroke-dasharray: 4 6;
    }

    .connectors .champion-path {
      stroke: var(--gold); stroke-width: 2.4;
      filter: drop-shadow(0 0 5px rgba(200, 180, 60, 0.6));
    }

    .connectors .divider-line {
      stroke: rgba(255,255,255,0.07); stroke-width: 1; stroke-dasharray: 3 5;
    }

    /* ── Match cards ── */
    .match {
      position: absolute; z-index: 2; width: 224px;
      animation: match-in 520ms cubic-bezier(0.2, 0.85, 0.28, 1) both;
      animation-delay: calc(var(--order, 0) * 42ms);
    }

    @keyframes match-in {
      from { opacity: 0; transform: translateX(-12px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    .match-head {
      display: grid; align-content: center; gap: 4px;
      height: 42px; padding: 7px 10px 8px;
      color: #fff; font-family: var(--display);
      font-size: 18px; font-weight: 1000; letter-spacing: 0.04em;
    }

    .match-head > span { display: block; line-height: 1; }

    .match-head small {
      color: rgba(255,255,255,0.68); font-size: 10px; font-weight: 800;
      letter-spacing: 0.08em; text-transform: uppercase; line-height: 1.05;
    }

    .match-body {
      position: relative; overflow: hidden;
      border: 1px solid rgba(200, 160, 60, 0.22);
      border-left: 2px solid var(--gold);
      background:
        linear-gradient(100deg, rgba(15, 22, 38, 0.96), rgba(5, 8, 15, 0.92) 66%, rgba(8, 10, 18, 0.96)),
        #060910;
      box-shadow: var(--shadow-gold), inset 0 0 18px rgba(200,160,60,0.02);
      clip-path: polygon(0 0, calc(100% - 12px) 0, 100% 12px, 100% 100%, 11px 100%, 0 calc(100% - 11px));
    }

    .match-body::after {
      position: absolute; top: -34px; right: 15px;
      width: 1px; height: 140px; content: &quot;&quot;;
      background: rgba(200, 180, 60, 0.08); transform: rotate(28deg);
    }

    .competitor {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto;
      column-gap: 8px;
      align-items: center; height: 36px;
      padding: 4px 12px 4px 8px;
      border-bottom: 1px solid rgba(200, 160, 60, 0.1);
    }

    .competitor:last-child { border-bottom: 0; }

    .seed {
      display: none;
      min-width: 28px;
      color: rgba(200, 180, 80, 0.6); font-family: var(--display);
      font-size: 9px; font-weight: 900; letter-spacing: 0.05em;
      text-align: center;
    }

    .competitor.winner .seed,
    .competitor.loser .seed,
    .seed.win,
    .seed.bye {
      display: block;
      font-size: 0;
    }

    .competitor.winner .seed::after,
    .seed.win::after {
      content: &quot;WIN&quot;;
      font-size: 9px;
      line-height: 1;
    }

    .competitor.loser .seed::after {
      content: &quot;BYE&quot;;
      font-size: 9px;
      line-height: 1;
    }

    .seed.bye::after {
      content: &quot;WIN&quot;;
      font-size: 9px;
      line-height: 1;
    }

    .team-copy { min-width: 0; }

    .team-name, .team-tag {
      display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }

    .team-name { color: #F0E6D3; font-size: 13px; font-weight: 800; line-height: 1.1; }

    .team-tag {
      margin-top: 2px; color: rgba(240, 230, 211, 0.46);
      font-family: var(--display); font-size: 8.5px; font-weight: 700;
      letter-spacing: 0.05em; text-transform: uppercase;
    }

    .score {
      justify-self: end;
      min-width: 18px;
      color: rgba(240, 230, 211, 0.56);
      font-family: var(--display);
      font-size: 16px;
      font-weight: 900;
      line-height: 1;
      text-align: right;
    }

    .competitor.winner .score {
      color: #f0e6d3;
      text-shadow: 0 0 12px rgba(200, 155, 60, 0.3);
    }

    /* Flow/R2+ matches */
    .match.flow .match-body {
      border-left-color: rgba(200, 170, 70, 0.7);
      background: linear-gradient(100deg, rgba(20, 28, 45, 0.84), rgba(5, 8, 14, 0.96));
    }

    /* Final match */
    .match.final .match-body {
      border: 1px solid rgba(200, 160, 60, 0.44);
      border-left: 3px solid var(--gold-bright);
      box-shadow: 0 0 36px rgba(200, 180, 60, 0.2), inset 0 0 24px rgba(200,155,60,0.04);
    }

    /* Semi match */
    .match.semi .match-body {
      border: 1px solid rgba(200, 155, 60, 0.32);
      border-left: 2.5px solid var(--gold);
    }

    /* Draw match (TP × 2) */
    .match.draw .match-body {
      border-left-color: var(--blue);
      box-shadow: 0 0 18px rgba(11, 196, 227, 0.14);
    }

    /* ── Bye block ── */
    .bye-block {
      position: absolute; z-index: 2; width: 224px;
      animation: match-in 520ms cubic-bezier(0.2, 0.85, 0.28, 1) both;
      animation-delay: calc(var(--order, 0) * 42ms);
    }

    .bye-block-inner {
      display: flex; align-items: center; justify-content: space-between;
      min-height: 72px; padding: 11px 13px;
      border: 1px dashed rgba(255,255,255,0.14);
      background: rgba(255,255,255,0.012);
      clip-path: polygon(0 0, calc(100% - 10px) 0, 100% 10px, 100% 100%, 10px 100%, 0 calc(100% - 10px));
    }

    .bye-label {
      font-family: var(--display); font-size: 10px; font-weight: 900;
      letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted);
    }

    .bye-team {
      display: block; font-size: 14px; font-weight: 800; color: #F0E6D3; margin-top: 4px;
    }

    .bye-tag {
      display: block; font-family: var(--display); font-size: 8.5px; font-weight: 700;
      color: rgba(240,230,211,0.42); letter-spacing: 0.08em;
      text-transform: uppercase; margin-top: 3px; white-space: normal; line-height: 1.4;
    }

    .bye-badge {
      flex-shrink: 0; padding: 4px 6px; color: var(--gold-bright);
      border: 1px solid rgba(200, 155, 60, 0.44);
      background: rgba(200, 155, 60, 0.07);
      font-family: var(--display); font-size: 9px; font-weight: 900;
      letter-spacing: 0.08em; text-transform: uppercase;
    }

    .bye-block.direct .bye-block-inner {
      border-color: rgba(200, 155, 60, 0.3);
      background: rgba(200, 155, 60, 0.04);
    }

    /* TP draw bye */
    .bye-block.draw-bye .bye-block-inner {
      border-color: rgba(11, 196, 227, 0.28); border-style: dashed;
      background: rgba(11, 196, 227, 0.025);
    }

    .bye-block.draw-bye .bye-badge {
      color: var(--blue); border-color: rgba(11, 196, 227, 0.42);
      background: rgba(11, 196, 227, 0.07);
    }

    /* ── Champion ── */
    .champion {
      position: absolute; z-index: 2; width: 184px;
      display: flex; flex-direction: column; align-items: center;
      padding: 20px 16px 22px;
      border: 1px solid rgba(200, 170, 60, 0.6);
      background:
        radial-gradient(ellipse at 50% 28%, rgba(200, 155, 60, 0.22) 0%, transparent 58%),
        linear-gradient(160deg, rgba(90, 65, 8, 0.5) 0%, #050810 72%);
      box-shadow:
        0 0 55px rgba(200, 155, 60, 0.38),
        0 0 110px rgba(200, 155, 60, 0.12),
        inset 0 1px 0 rgba(240, 200, 80, 0.2),
        inset 0 0 36px rgba(200, 155, 60, 0.06);
      clip-path: polygon(0 18px, 18px 0, 100% 0, 100% calc(100% - 18px), calc(100% - 18px) 100%, 0 100%);
      text-align: center;
      animation: pulse-crown 2.8s ease-in-out infinite;
    }

    @keyframes pulse-crown {
      0%, 100% {
        filter: brightness(0.88);
        box-shadow: 0 0 40px rgba(200,155,60,0.28), 0 0 80px rgba(200,155,60,0.10), inset 0 0 28px rgba(200,155,60,0.04);
      }
      50% {
        filter: brightness(1.28);
        box-shadow: 0 0 70px rgba(200,155,60,0.58), 0 0 130px rgba(200,155,60,0.22), inset 0 0 46px rgba(200,155,60,0.12);
      }
    }

    .champion-trophy {
      width: 54px; height: 62px; margin-bottom: 9px; display: block;
      color: var(--gold);
      filter: drop-shadow(0 0 8px rgba(200, 180, 60, 0.9)) drop-shadow(0 0 18px rgba(200, 155, 50, 0.5));
      animation: trophy-float 3.4s ease-in-out infinite;
    }

    @keyframes trophy-float {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-5px); }
    }

    .champion span, .champion strong { display: block; }

    .champion span {
      color: rgba(200, 180, 80, 0.72); font-family: var(--display);
      font-size: 8px; font-weight: 900; letter-spacing: 0.28em; text-transform: uppercase;
    }

    .champion strong {
      margin-top: 4px; color: #fff; font-family: var(--display);
      font-size: 19px; font-weight: 1000; letter-spacing: 0.06em;
      text-shadow: 0 0 22px rgba(200, 180, 60, 0.72), 0 0 48px rgba(200, 155, 40, 0.32);
    }

    /* ── Legend ── */
    .legend {
      position: absolute; z-index: 3; right: 32px; bottom: 24px;
      display: flex; gap: 18px;
      color: rgba(255,255,255,0.38); font-family: var(--display);
      font-size: 9px; font-weight: 800; letter-spacing: 0.12em; text-transform: uppercase;
    }

    .legend span { display: inline-flex; align-items: center; gap: 7px; }
    .legend i { display: inline-block; width: 24px; border-top: 2px solid rgba(200, 170, 80, 0.65); }
    .legend .bye-line { border-top-color: rgba(255,255,255,0.28); border-top-style: dashed; }
    .legend .champ-line { border-top-color: var(--gold); border-top-width: 2.5px; }
    .legend .draw-line { border-top-color: var(--blue); }

    /* ── Info section ── */
    .information-grid {
      display: grid;
      grid-template-columns: minmax(0, 1.22fr) minmax(360px, 0.78fr);
      gap: 14px; margin-top: 14px;
    }

    .info-card {
      position: relative; min-height: 240px; padding: 24px; overflow: hidden;
      border: 1px solid var(--line-soft);
      background: linear-gradient(145deg, rgba(200,155,60,0.03), rgba(5,8,18,0.9));
    }

    .info-card::before {
      position: absolute; top: 0; left: 0; width: 72px; height: 2px; content: &quot;&quot;;
      background: var(--gold); box-shadow: 0 0 14px rgba(200,180,60,0.4);
    }

    .section-heading {
      display: flex; align-items: flex-start; justify-content: space-between;
      gap: 20px; margin-bottom: 18px;
    }

    .section-heading h2, .section-heading p { margin: 0; }

    .section-heading h2 {
      color: #fff; font-family: var(--display);
      font-size: 22px; font-weight: 1000; font-style: italic; letter-spacing: -0.025em;
    }

    .section-heading p {
      max-width: 380px; color: var(--muted);
      font-size: 10px; line-height: 1.6; text-align: right;
    }

    .team-pool {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 7px;
    }

    .team-chip {
      position: relative; display: grid;
      grid-template-columns: 22px minmax(0,1fr) auto;
      align-items: center; gap: 7px; min-height: 48px; padding: 6px 9px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.016);
    }

    .team-chip.grp-a {
      border-color: rgba(200, 155, 60, 0.26);
      background: linear-gradient(100deg, rgba(200, 140, 30, 0.07), transparent);
    }

    .team-chip.grp-b {
      border-color: rgba(11, 196, 227, 0.18);
      background: linear-gradient(100deg, rgba(11, 180, 220, 0.05), transparent);
    }

    .team-chip.grp-tp {
      border-color: rgba(11, 196, 227, 0.35);
      background: linear-gradient(100deg, rgba(11, 196, 227, 0.08), transparent);
    }

    .team-chip.grp-bye {
      border-color: rgba(200, 155, 60, 0.42);
      background: linear-gradient(100deg, rgba(200, 155, 60, 0.1), transparent);
    }

    .chip-index {
      color: var(--gold); font-family: var(--display); font-size: 11px; font-weight: 1000;
    }

    .chip-copy { min-width: 0; }

    .chip-copy strong, .chip-copy span {
      display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }

    .chip-copy strong { color: #F0E6D3; font-size: 11px; }
    .chip-copy span { margin-top: 2px; color: var(--muted); font-size: 8px; letter-spacing: 0.06em; text-transform: uppercase; }

    .chip-state {
      padding: 3px 5px; color: #c8bfb0;
      border: 1px solid rgba(255,255,255,0.1);
      font-family: var(--display); font-size: 7px; font-weight: 900;
      letter-spacing: 0.08em; text-transform: uppercase;
    }

    .team-chip.grp-bye .chip-state {
      color: var(--gold-bright); border-color: rgba(200,155,60,0.38);
      background: rgba(200,155,60,0.08);
    }

    .team-chip.grp-tp .chip-state {
      color: var(--blue); border-color: rgba(11,196,227,0.38);
      background: rgba(11,196,227,0.07);
    }

    /* ── Rule list ── */
    .rule-list {
      display: grid; gap: 12px; margin: 0; padding: 0;
      list-style: none; counter-reset: rules;
    }

    .rule-list li {
      position: relative; min-height: 36px; padding: 0 0 12px 46px;
      color: #c0bab0; border-bottom: 1px solid rgba(255,255,255,0.06);
      font-size: 11px; line-height: 1.66; counter-increment: rules;
    }

    .rule-list li:last-child { border-bottom: 0; padding-bottom: 0; }

    .rule-list li::before {
      position: absolute; top: 1px; left: 0;
      display: grid; width: 30px; height: 30px; place-items: center;
      background: rgba(200, 155, 60, 0.1);
      border: 1px solid rgba(200, 155, 60, 0.46);
      color: var(--gold);
      content: counter(rules, decimal-leading-zero);
      font-family: var(--display); font-size: 9px; font-weight: 1000;
      clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
    }

    .rule-list b { color: #F0E6D3; }

    /* ── Footer ── */
    .page-footer {
      display: flex; justify-content: space-between; gap: 20px;
      margin-top: 18px; padding-top: 15px;
      color: #5a5548; border-top: 1px solid rgba(255,255,255,0.06);
      font-size: 9px; letter-spacing: 0.08em; text-transform: uppercase;
    }

    /* ── Responsive ── */
    @media (max-width: 980px) {
      .masthead { grid-template-columns: 1fr auto; align-items: start; }
      .title-lockup { grid-column: 1 / -1; grid-row: 2; }
      .control-strip { grid-template-columns: 1fr auto; }
      .format-status { grid-column: 1 / -1; grid-row: 2; padding: 12px 0 0; border-top: 1px solid var(--line-soft); border-left: 0; }
      .information-grid { grid-template-columns: 1fr; }
      .scroll-hint { display: block; }
    }

    @media (max-width: 620px) {
      .page-shell { padding-inline: 12px; }
      h1 { font-size: 40px; }
      h1::before, h1::after { margin: 0 8px; font-size: 9px; }
      .team-pool { grid-template-columns: 1fr 1fr; }
      .page-footer { display: block; line-height: 1.8; }
    }

    @media print {
      @page { size: A3 landscape; margin: 7mm; }
      body { print-color-adjust: exact; -webkit-print-color-adjust: exact; }
      .page-shell { width: 100%; padding: 0; }
      .masthead { min-height: 100px; }
      .actions, .scroll-hint, .information-grid, .page-footer { display: none !important; }
      .control-strip { grid-template-columns: 1fr 2fr; }
      .bracket-frame { border: 0; }
      .bracket-viewport { overflow: visible; }
      .bracket { transform: scale(0.56); transform-origin: top left; }
      .bracket-frame, .bracket-viewport { height: 740px; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }
  &lt;/style&gt;
&lt;/head&gt;

    &lt;section class=&quot;bracket-frame&quot; aria-label=&quot;英雄联盟赛程图&quot;&gt;
      &lt;div class=&quot;scroll-hint&quot; aria-hidden=&quot;true&quot;&gt;← 横向滑动查看完整赛程 →&lt;/div&gt;

        &lt;div class=&quot;bracket&quot;&gt;

          &lt;!-- Stage labels --&gt;
          &lt;div class=&quot;stage-label s1&quot;&gt;
            &lt;b&gt;第一轮&lt;/b&gt;Round 01
            &lt;span class=&quot;date&quot;&gt;7月21日—23日&lt;/span&gt;
          &lt;/div&gt;
          &lt;div class=&quot;stage-label s2&quot;&gt;
            &lt;b&gt;第二轮&lt;/b&gt;Round 02
            &lt;span class=&quot;date&quot;&gt;7月24日—28日&lt;/span&gt;
          &lt;/div&gt;
          &lt;div class=&quot;stage-label s3&quot;&gt;
            &lt;b&gt;半决赛&lt;/b&gt;Semi-Final
            &lt;span class=&quot;date&quot;&gt;7月29日—31日&lt;/span&gt;
          &lt;/div&gt;
          &lt;div class=&quot;stage-label s4&quot;&gt;
